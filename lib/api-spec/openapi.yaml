openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Loan Management API - JRPrestamos (Spring Boot Backend)
servers:
  - url: /api
    description: Base API path (Spring Boot context-path)
tags:
  - name: auth
    description: Authentication
  - name: loans
    description: Loan operations (user)
  - name: admin
    description: Admin loan management
paths:
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate user and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /loans:
    post:
      operationId: requestLoan
      tags: [loans]
      summary: Request a new loan (USER only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanRequest"
      responses:
        "201":
          description: Loan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden

  /loans/my:
    get:
      operationId: getMyLoans
      tags: [loans]
      summary: Get loans for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of user's loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loan"
        "403":
          description: Forbidden

  /admin/loans:
    get:
      operationId: getAllLoans
      tags: [admin]
      summary: Get all loans (ADMIN only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of all loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loan"
        "403":
          description: Forbidden

  /admin/loans/{id}/approve:
    put:
      operationId: approveLoan
      tags: [admin]
      summary: Approve a loan (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Loan approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "404":
          description: Loan not found
        "403":
          description: Forbidden

  /admin/loans/{id}/reject:
    put:
      operationId: rejectLoan
      tags: [admin]
      summary: Reject a loan (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Loan rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "404":
          description: Loan not found
        "403":
          description: Forbidden

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthToken:
      type: object
      properties:
        token:
          type: string
        role:
          type: string
          enum: [ROLE_ADMIN, ROLE_USER]
        email:
          type: string
      required:
        - token
        - role
        - email

    LoanRequest:
      type: object
      properties:
        monto:
          type: number
          description: Loan amount
        plazo:
          type: integer
          description: Loan term in months (optional)
      required:
        - monto

    Loan:
      type: object
      properties:
        id:
          type: integer
        monto:
          type: number
        plazo:
          type: integer
          nullable: true
        fechaSolicitud:
          type: string
          format: date-time
        estado:
          type: string
          enum: [PENDIENTE, APROBADO, RECHAZADO]
        userEmail:
          type: string
      required:
        - id
        - monto
        - fechaSolicitud
        - estado
        - userEmail

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            type: string
      required:
        - message
