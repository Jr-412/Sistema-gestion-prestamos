kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "mvn -f /home/runner/workspace/backend/pom.xml spring-boot:run -q"

[services.production]

[services.production.build]
args = ["bash", "-c", "mvn -f /home/runner/workspace/backend/pom.xml package -DskipTests -q"]

[services.production.run]
args = ["bash", "-c", "java -jar /home/runner/workspace/backend/target/backend-0.0.1-SNAPSHOT.jar"]

[services.production.health.startup]
path = "/api/auth/login"
